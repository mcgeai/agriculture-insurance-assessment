services:
  - type: web
    name: agriculture-insurance-assessment
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: cd server && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/server/database/assessment.db
